<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
        </header>

        <div class="balance-card">
            <h4>Total Balance</h4>
            <h1 id="balance">$0.00</h1>
        </div>

        <div class="inc-exp-row">
            <div class="box income">
                <span>Income</span>
                <p id="money-plus">+$0.00</p>
            </div>
            <div class="box expense">
                <span>Expenses</span>
                <p id="money-minus">-$0.00</p>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="expenseChart"></canvas>
        </div>

        <form id="form">
            <h3>Add Transaction</h3>
            
            <input type="text" id="text" placeholder="Description (e.g. Rent)" required>

            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="type" value="income" checked> Income
                </label>
                <label class="radio-label">
                    <input type="radio" name="type" value="expense"> Expense
                </label>
            </div>

            <input type="number" id="amount" placeholder="Amount" step="0.01" required>
            
            <button class="btn">Add Transaction</button>
        </form>
    </div>
<button id="reset-btn" class="bg-red-500 text-white px-6 py-2 rounded-xl font-800 hover:bg-red-600 transition-all ml-2">
    Reset All
</button>
    <script src="script.js"></script>
</body>
</html>
